# MoveIt trajectory execution config for Gazebo simulation.
# allowed_start_tolerance is set to 0.05 (vs 0.01 default) because
# gz_ros2_control's position PD loop lets joints drift a few milliradians
# under gravity between planning and execution.

trajectory_execution:
  allowed_execution_duration_scaling: 1.5
  allowed_goal_duration_margin: 0.5
  # 0.0 disables start-state deviation check entirely.
  # In simulation the pure-P position hold has steady-state gravity error,
  # so enforcing a tolerance only aborts valid executions.
  allowed_start_tolerance: 0.0
  execution_duration_monitoring: true

moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

moveit_simple_controller_manager:
  controller_names:
    - panda_arm_controller
    - panda_hand_controller

  panda_arm_controller:
    type: FollowJointTrajectory
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7
    action_ns: follow_joint_trajectory
    default: true

  panda_hand_controller:
    type: GripperCommand
    joints:
      - panda_finger_joint1
    action_ns: gripper_cmd
    default: true
